settings:
  output_directory: output
  smoothing_length: 1.0e-2
  min_weight: 0.01
  max_recursions: 40
  max_loops: 10
  mesh_bvh_max_children: 2
  mesh_bvh_max_depth: 100
  scene_bvh_max_children: 2
  scene_bvh_max_depth: 100
spectra:
  green: [0x006600ff, 0x00dd33ff]
  dark_green: [0x003300ff, 0x00aa00ff]
  blue: [0x0033aaff, 0x0077ffff]
  yellow: [0xcccc00ff, 0xffff00ff]
  gray: [0x444444ff, 0xddddddff]
  purple: [0x330088ff, 0x9900ffff]
  teal: [0x880088ff, 0xdd00ffff]
meshes:
  bushes: ./assets/meshes/islands/wizard/bushes.obj
  ground: ./assets/meshes/islands/wizard/ground.obj
  rocks: ./assets/meshes/islands/wizard/rocks.obj
  walls: ./assets/meshes/islands/wizard/walls.obj
  windows: ./assets/meshes/islands/wizard/windows.obj
  roofs: ./assets/meshes/islands/wizard/roofs.obj
  puddle_blob: ./assets/meshes/natural/water/puddle_blob.obj
  puddle_splat: ./assets/meshes/natural/water/puddle_splat.obj
  icosphere: ./assets/meshes/shapes/simple/icosphere.obj
  cube: ./assets/meshes/shapes/simple/cube.obj
materials:
  grass: !Diffuse
    spectrum_id: green
  foliage: !Diffuse
    spectrum_id: dark_green
  stone: !Diffuse
    spectrum_id: purple
  crystal: !Diffuse
    spectrum_id: yellow
  brick: !Diffuse
    spectrum_id: gray
  slate: !Diffuse
    spectrum_id: teal
  water: !Reflective
    spectrum_id: blue
    absorption: 0.4
  glass: !Refractive
    spectrum_id: blue
    absorption: 0.1
    refractive_index: 1.5
entities:
  - material_id: grass
    mesh_id: ground
    scale: 2.0
  - material_id: stone
    mesh_id: rocks
    scale: 2.0
  - material_id: foliage
    mesh_id: bushes
    scale: 2.0
  - material_id: brick
    mesh_id: walls
  - material_id: crystal
    mesh_id: windows
  - material_id: slate
    mesh_id: roofs
  - material_id: water
    mesh_id: puddle_blob
    rotation: [0, 0, 270]
    translation: [-0.7, -0.1, 0]
    scale: 0.04
  - material_id: water
    mesh_id: puddle_splat
    rotation: [0, 0, 230]
    translation: [0.6, -0.7, 0]
    scale: 0.03
  - material_id: glass
    translation: [-0.5, -0.4, 0.5]
    rotation: [0, 25, 45]
    mesh_id: icosphere
    scale: 2.0
lights:
  - position: [10, 30, 200]
    intensity: 1.0
    colour: 0xffffaaff
cameras:
  main_camera:
    engine: !Full [-10, -4, 5]
    position: [-35, -50, 25]
    look_at: [0, 0, 0]
    field_of_view: 25
    resolution: [600, 400]
    num_tiles: [10, 10]
    super_samples_per_axis: 1
  far_camera:
    engine: !Full [-50, -10, 25]
    position: [-100, -100, 100]
    look_at: [0, 0, 0]
    field_of_view: 5
    resolution: [600, 400]
    num_tiles: [10, 10]
    super_samples_per_axis: 1

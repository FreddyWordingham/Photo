settings:
  output_directory: output
  sun_position: [130.0, 50.0, 120.0]
  smoothing_length: 1.0e-2
  min_weight: 0.1
  max_loops: 10000
  mesh_bvh_max_children: 8
  scene_bvh_max_children: 3
cameras:
  - position: [-5.0, 20.0, 20.0]
    target: [0.0, 0.0, 2.5]
    field_of_view: 45.0
    resolution: [1440, 1440]
    num_tiles: [20, 40]
    super_samples_per_axis: 2
  
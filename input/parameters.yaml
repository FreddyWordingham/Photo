settings:
  output_directory: output
  sun_position: [0.0, 0.0, 20.0]
gradients:
  white:
    colours: [0x000000ff, 0xffffffff]
materials:
  plastic: !Diffuse
    gradient_id: white
  mirror: !Reflective
    gradient_id: white
    reflectivity: 0.9
  glass: !Refractive
    gradient_id: white
    refractive_index: 1.5
meshes:
  square: ./assets/meshes/square.obj
  cube: ./assets/meshes/cube.obj
  hemisphere: ./assets/meshes/hemisphere.obj
  icosphere: ./assets/meshes/icosphere.obj
  torus: ./assets/meshes/torus.obj
  tree: ./assets/meshes/tree.obj
instances:
  # hemisphere:
  #   mesh_id: hemisphere
  #   material_id: plastic
  #   scale: 2.0
  #   translation: [0.0, 0.0, 2.0]
  floor:
    mesh_id: square
    material_id: plastic
    scale: 5.0
  left_cube:
    mesh_id: cube
    material_id: plastic
    translation: [-3.0, 0.0, 0.0]
  right_cube:
    mesh_id: cube
    material_id: plastic
    translation: [3.0, 0.0, 0.0]
    rotation: [10.0, 15.0, 20.0]
    scale: 0.5
  front_sphere:
    mesh_id: icosphere
    material_id: plastic
    translation: [0.0, 4.0, 0.0]
    scale: 0.25
  planet_sphere_0:
    mesh_id: icosphere
    material_id: plastic
    translation: [4.0, 8.0, 8.0]
    scale: 0.25
  planet_ring_0:
    mesh_id: torus
    material_id: plastic
    translation: [4.0, 8.0, 8.0]
    rotation: [45.0, 15.0, 30.0]
    scale: 0.5
  planet_sphere_1:
    mesh_id: icosphere
    material_id: plastic
    translation: [4.0, -8.0, 4.0]
    scale: 0.5
  planet_ring_1:
    mesh_id: torus
    material_id: plastic
    translation: [4.0, -8.0, 4.0]
    rotation: [145.0, 75.0, 70.0]
  tree:
    mesh_id: tree
    material_id: plastic
    translation: [0.0, 0.0, 0.0]
cameras:
  - position: [8.0, 8.0, 8.0]
    target: [0.0, 0.0, 2.5]
    field_of_view: 240.0
    resolution: [1440, 3440]
    num_tiles: [20, 40]
    super_samples_per_axis: 1
  
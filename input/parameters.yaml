settings:
  output_directory: output
  smoothing_length: 1.0e-2
  min_weight: 0.01
  max_loops: 1000
  mesh_bvh_max_children: 2
  mesh_bvh_max_depth: 100
  scene_bvh_max_children: 2
  scene_bvh_max_depth: 100
spectra:
  white: [0x444444ff, 0xffffffff]
meshes:
  hemisphere: ./assets/meshes/shapes/simple/hemisphere.obj
  hemisphere_inverted: ./assets/meshes/shapes/simple/hemisphere_inverted.obj
materials:
  plastic: !Diffuse
    spectrum_id: white
entities:
  - material_id: plastic
    mesh_id: hemisphere
    rotation: [180, 0, 0]
    translation: [0, 2, 0]
  - material_id: plastic
    mesh_id: hemisphere
    translation: [0, 2, 0]
  - material_id: plastic
    mesh_id: hemisphere_inverted
    rotation: [180, 0, 0]
    translation: [0, -2, 0]
  - material_id: plastic
    mesh_id: hemisphere_inverted
    translation: [0, -2, 0]
lights:
  - position: [10, 30, 200]
    intensity: 1.0
    colour: 0xffffaaff
cameras:
  main_camera:
    engine: !Diffuse [[-10, 0, 15], 1.0]
    position: [-6, -6, 3]
    look_at: [0, 0, 0]
    field_of_view: 90
    resolution: [400, 300]
    num_tiles: [10, 10]
    super_samples_per_axis: 1

settings:
  output_directory: output
  smoothing_length: 1.0e-2
  min_weight: 0.01
  max_loops: 1000
spectra:
  green: [0x000000ff, 0x00dd33ff]
  blue: [0x000000ff, 0x0000ffff]
  yellow: [0xffffffff, 0xffff00ff]
  gray: [0x444444ff, 0xddddddff]
meshes:
  cube: ./assets/meshes/cube.obj
  icosphere: ./assets/meshes/icosphere.obj
  square: ./assets/meshes/cube.obj
materials:
  grass: !Diffuse
    spectrum_id: green
  sky: !Diffuse
    spectrum_id: blue
entities:
  - material_id: sky
    mesh_id: square
  - material_id: grass
    mesh_id: cube
  - material_id: grass
    mesh_id: icosphere
lights:
  - position: [10, 30, 200]
    intensity: 1.0
    colour: 0xffffaaff
cameras:
  camera_0:
    position: [10, 8, 6]
    look_at: [0, 0, 0]
    field_of_view: 45
    resolution: [800, 600]
    num_tiles: [8, 12]

    gradient_id: white
  glass: !Diffuse
    gradient_id: glass
  spectrum: !Diffuse
    gradient_id: spectrum
  bliss: !Diffuse
    gradient_id: bliss
  sunrise: !Diffuse
    gradient_id: sunrise
  sunset: !Diffuse
    gradient_id: sunset
  forest: !Diffuse
    gradient_id: forest
  rainbow: !Diffuse
    gradient_id: rainbow
  inferno: !Diffuse
    gradient_id: inferno
  safari: !Diffuse
    gradient_id: safari
  oceanic: !Diffuse
    gradient_id: oceanic
  mystic: !Diffuse
    gradient_id: mystic
  twilight: !Diffuse
    gradient_id: twilight
  mirror: !Reflective
    gradient_id: glass
    absorption: 0.1
  refractive: !Refractive
    gradient_id: glass
    absorption: 0.3
    refractive_index: 1.5
meshes:
  square: ./assets/meshes/square.obj
  cube: ./assets/meshes/cube.obj
  hemisphere: ./assets/meshes/hemisphere.obj
  icosphere: ./assets/meshes/icosphere.obj
  sphere: ./assets/meshes/sphere.obj
  torus: ./assets/meshes/torus.obj
  tree: ./assets/meshes/tree.obj
instances:
  hemisphere:
    mesh_id: sphere
    material_id: refractive
    scale: 5.0
    translation: [0.0, 0.0, 0.0]
    rotation: [180.0, 0.0, 0.0]
  floor:
    mesh_id: square
    material_id: forest
    scale: 5.0
  tree:
    mesh_id: tree
    material_id: safari
    translation: [0.0, 0.0, 0.0]


<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="Viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                height: 100vh;
            }
            .container {
                display: grid;
                place-items: center;
                height: 100%;
            }
        </style>
        <title>Ray-tracing</title>
    </head>
    <body>
        <div id="container" class="container">
            <h1 id="output_label" style="display: none; color: red">WebGPU is not supported by this browser.</h1>
            <canvas id="gfx_main" width="600" height="1000"></canvas>
            <div id="hud">
                <h4 style="display: inline-block">Frame time:</h4>
                <h4 id="frame_time_label" style="display: inline-block"></h4>
                |
                <h4 style="display: inline-block">Object count:</h4>
                <h4 id="object_count_label" style="display: inline-block"></h4>
            </div>
        </div>
        <script src="dist/main.js"></script>
    <!-- Code injected by live-server -->
<script type="text/javascript">
	// <![CDATA[  <-- For SVG support
	if ('WebSocket' in window) {
		(function() {
			function refreshCSS() {
				var sheets = [].slice.call(document.getElementsByTagName("link"));
				var head = document.getElementsByTagName("head")[0];
				for (var i = 0; i < sheets.length; ++i) {
					var elem = sheets[i];
					head.removeChild(elem);
					var rel = elem.rel;
					if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
						var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
						elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
					}
					head.appendChild(elem);
				}
			}
			var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
			var address = protocol + window.location.host + window.location.pathname + '/ws';
			var socket = new WebSocket(address);
			socket.onmessage = function(msg) {
				if (msg.data == 'reload') window.location.reload();
				else if (msg.data == 'refreshcss') refreshCSS();
			};
			console.log('Live reload enabled.');
		})();
	}
	// ]]>
</script>
</body>
</html>

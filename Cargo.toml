[package]
name = "photo"
version = "1.0.0"
edition = "2021"
description = "Render high quality images from a scene description"
license = "MIT"

[dependencies]
enterpolation = "0.2.1"
image = "0.24.7"
indicatif = "0.17.7"
nalgebra = "0.32.3"
ndarray = { "version" = "0.15.6", "features" = ["rayon"] }
palette = "0.7.3"
rand = "0.8.5"
rayon = "1.8.0"
serde = { "version" = "1.0.190", features = ["derive"] }
serde_yaml = "0.9.27"

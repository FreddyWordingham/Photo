[package]
name = "photo"
version = "1.0.0"
description = "High-precision rendering engine."
edition = "2021"
license = "LICENSE"
readme = "README.md"
authors = ["Freddy Wordingham <freddy@digilab.co.uk>"]
documentation = "https://freddywordingham.github.io/photo"
repository = "https://github.com/FreddyWordingham/photo"
keywords = ["rendering", "ray-tracing", "simulation"]
categories = ["science", "graphics", "simulation"]

[dependencies]
enterpolation = "0.2.1"
nalgebra = "0.32.3"
ndarray = { version = "0.15.6", features = ["rayon"] }
palette = "0.7.3"
serde = { "version" = "1.0.193", features = ["derive"] }
